name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # Apple Silicon runner: same ISA the kernels are tuned for.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
      # GitHub's macos-14 runners have no Apple GPU exposed to Metal, so this
      # job can only *compile* the metal feature — it cannot execute the
      # GPU kernels. The "270 tests on the full Metal build", the Metal<->CPU
      # bit-identical counts, and the Metal f32 timings are therefore measured
      # locally on Apple Silicon; CI gates the 261 CPU tests plus that the
      # metal feature builds. See the "CI honesty" note in the README.
      - name: Metal feature compiles
        run: cargo check --features metal
      - name: Release smoke (bell)
        run: |
          cargo build --release
          ./target/release/zeno info
          ./target/release/zeno run examples/bell.qasm --shots 1000 --seed 1
